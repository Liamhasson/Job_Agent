name: Job Agent — Daily Run

on:
  schedule:
    - cron: "0 7 * * *"   # 7am UTC = 8am Berlin (CET) / 9am CEST
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write       # needed to commit seen_jobs.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf2.0-0

      - name: Run job agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: python orchestrator.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name "Job Agent Bot"
          git config user.email "actions@github.com"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen jobs [skip ci]"
          git push
